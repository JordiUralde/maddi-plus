<div class="incidencias-panel">

  <!-- Cabecera -->
  <div class="panel-header">
    <span class="panel-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      Incidencias
      <span class="badge">{{ incidencias?.features?.length ?? 0 }}</span>
    </span>
    <div class="header-actions">
      <button class="btn-capa"
              [class.activo]="capasVisible"
              (click)="toggleCapa()"
              title="Mostrar/ocultar capa en el mapa">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2.2"
             stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/>
          <polyline points="2 12 12 17 22 12"/>
        </svg>
        {{ capasVisible ? 'Ocultar capa' : 'Mostrar capa' }}
      </button>
      <button class="btn-cerrar" (click)="cerrado.emit()" title="Cerrar">✕</button>
    </div>
  </div>

  <!-- Filtros por tipo -->
  <div class="filtros">
    <button class="chip" [class.activo]="filtroActivo === null" (click)="setFiltro(null)">
      Todas
    </button>
    <button
      *ngFor="let tipo of tipos"
      class="chip"
      [class.activo]="filtroActivo === tipo"
      [style.--color]="colorTipo(tipo)"
      (click)="setFiltro(tipo)">
      <span class="dot" [style.background]="colorTipo(tipo)"></span>
      {{ tipo }}
      <span class="chip-count">{{ countTipo(tipo) }}</span>
    </button>
  </div>

  <!-- Lista de incidencias -->
  <div class="lista">
    <div *ngIf="featuresVisibles.length === 0" class="sin-resultados">
      Sin incidencias para este filtro
    </div>
    <div
      *ngFor="let f of featuresVisibles; trackBy: trackByMatricula"
      class="item"
      (click)="onZoom(f)"
      title="Centrar en el mapa">
      <span class="tipo-dot" [style.background]="colorTipo(tipoDeIncidencia(f))"></span>
      <div class="item-info">
        <span class="item-desc">{{ f.properties.descripcion_incidencia }}</span>
        <span class="item-dir">{{ f.properties.direccion }}</span>
        <span class="item-meta">
          Matrícula {{ f.properties.matricula }}
          <ng-container *ngIf="f.properties.fraccion"> · {{ f.properties.fraccion }}</ng-container>
        </span>
      </div>
      <svg class="icono-zoom" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
           viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </div>
  </div>

</div>
