<div class="rutas-panel">

  <!-- Cabecera -->
  <div class="panel-header">
    <span class="panel-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="8 12 12 16 16 12"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
      </svg>
      Rutas de recogida
      <span class="badge">{{ rutas.length }}</span>
    </span>
    <button class="btn-cerrar" (click)="cerrado.emit()" title="Cerrar">✕</button>
  </div>

  <!-- Sin rutas -->
  <div *ngIf="rutas.length === 0" class="sin-rutas">
    Sin rutas disponibles
  </div>

  <!-- Lista de rutas -->
  <div class="lista">
    <div *ngFor="let ruta of rutas; trackBy: trackById" class="ruta-item">

      <!-- Cabecera de la ruta -->
      <div class="ruta-header">
        <div class="ruta-info" (click)="toggleExpandida(ruta)">
          <span class="ruta-icono">🚛</span>
          <div class="ruta-meta">
            <span class="ruta-nombre">{{ ruta.nombre }}</span>
            <span class="ruta-paradas">{{ ruta.paradas.length }} paradas</span>
          </div>
          <svg class="chevron" [class.abierto]="isExpandida(ruta)"
               xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>

        <!-- Botón activar/desactivar -->
        <button class="btn-toggle"
                [class.activo]="isActiva(ruta)"
                [disabled]="isCargando(ruta)"
                (click)="toggleRuta.emit(ruta)"
                [title]="isActiva(ruta) ? 'Ocultar ruta en el mapa' : 'Mostrar ruta en el mapa'">
          <span *ngIf="isCargando(ruta)" class="spinner"></span>
          <svg *ngIf="!isCargando(ruta)" xmlns="http://www.w3.org/2000/svg" width="13" height="13"
               viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          {{ isActiva(ruta) ? 'Ocultar' : 'Ver en mapa' }}
        </button>
      </div>

      <!-- Lista de paradas expandible -->
      <div class="paradas-lista" *ngIf="isExpandida(ruta)">
        <div *ngFor="let parada of ruta.paradas" class="parada-item">
          <div class="parada-info">
            <span class="parada-dir">{{ parada.direccion ?? '—' }}</span>
            <span class="parada-hora" *ngIf="parada.programado_en">
              🕐 {{ parada.programado_en }}
            </span>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
